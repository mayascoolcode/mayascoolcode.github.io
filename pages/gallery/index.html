<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="/build/actions.js"></script>
    <link rel="stylesheet" href="/build/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gallery | mmmd</title>
</head>
<body>
    <nav class="wrap" id="navGallery">
        <img src="" alt="gallery image">
        <ul class="listgroup">
            <li><button onclick="showContent('photosectionGallery')">PHOTOS</button></li>
            <li><button onclick="showContent('videosectionGallery')">VIDEOS</button></li>
        </ul>
    </nav>
    <hr>
    <main>
        <!-- PHOTO SECTION -->
        <section class="grid" id="photosectionGallery">
            <div class="photo">
                <img src="/content/photos/yaoiblackkitty.JPG" alt="black kitty in yaoi manga">
                <div class="photo-date">1/3/2025</div>
            </div>
        </section>
        <!-- VIDEO SECTION -->
        <section class="grid hide" id="videosectionGallery">
            <div class="video">
                <video controls muted poster="" src="/content/videos/Inosuke throws a pillow at Zenitsu.mp4"></video>
                <div class="video-desc">A video description.</div>
            </div>
        </section>
    </main>
    <div class="return">
        <a href="/index.html">
            <img src="/content/assets/sigil.png" alt="">
        </a>
    </div>
</body>
</html>
