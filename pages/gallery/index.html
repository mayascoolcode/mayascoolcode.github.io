<!DOCTYPE html>
<html lang="en" id="gallery">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/style.css">
  <script type="module" src="drag_images.js"></script>
  <script type="module" src="photos_videos.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gallery | mtchtmy</title>
</head>

<body onload="move('.photo')">
  <header class="flex">
    <button class="big_button" onclick="showGallery('photos')">PHOTOS</button>
    <button class="big_button" onclick="showGallery('videos')">VIDEOS</button>
  </header>
  <main>
    <img src="/content/photos/furry_yaoi.jpg" alt="" class="photo">
    <img src="/content/photos/gay_niggas.jpg" alt="" class="photo">
    <img src="/content/photos/kirasfirstvictim.jpg" alt="" class="photo">
    <img src="/content/photos/kitty_baby.jpg" alt="" class="photo">
    <img src="/content/photos/motivation.JPG" alt="" class="photo">
    <img src="/content/photos/my_eye.jpg" alt="" class="photo">
  </main>
  <div class="return"><a href="/"><img src="/content/gifs/back.gif" alt=""></a></div>
</body>

<script>
  function getRandomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  var randomOrder = function (element) {

    // Viewport Dimensions
    var vpHeight = window.innerHeight;
    var vpWidth = window.innerWidth;

    // Image Position
    var xPos = getRandomInt(0, vpWidth - element.offsetWidth);
    var yPos = getRandomInt(0, vpHeight - element.offsetHeight);
    var zIndex = getRandomInt(0, 13);

    element.style.cssText += '--x-position:' + xPos + 'px; --y-position:' + yPos + 'px; z-index:' + zIndex;
  };

  //Setup
  var p = document.querySelectorAll('.photo');

  p.forEach((photos) => {

    window.addEventListener('load', function () {
      randomOrder(photos);
    });

    window.addEventListener('resize', function () {
      randomOrder(photos);
    });

  }); //end foreach
</script>

</html>
